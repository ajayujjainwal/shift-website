<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <pattern id="innovGrid" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Primary grid lines -->
      <line x1="0" y1="0" x2="100" y2="0" stroke="#eef0f4" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#eef0f4" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="100" stroke="#eef0f4" stroke-width="0.5" opacity="0.5"/>
      <line x1="50" y1="0" x2="50" y2="100" stroke="#eef0f4" stroke-width="0.5" opacity="0.5"/>

      <!-- Sub-grid lines -->
      <line x1="0" y1="25" x2="100" y2="25" stroke="#eef0f4" stroke-width="0.3" opacity="0.3"/>
      <line x1="0" y1="75" x2="100" y2="75" stroke="#eef0f4" stroke-width="0.3" opacity="0.3"/>
      <line x1="25" y1="0" x2="25" y2="100" stroke="#eef0f4" stroke-width="0.3" opacity="0.3"/>
      <line x1="75" y1="0" x2="75" y2="100" stroke="#eef0f4" stroke-width="0.3" opacity="0.3"/>

      <!-- Circuit trace - horizontal with jog -->
      <polyline points="0,50 15,50 20,45 35,45 40,50 50,50" stroke="#eef0f4" stroke-width="0.6" opacity="0.5" fill="none" stroke-linecap="round"/>
      <polyline points="50,25 65,25 70,20 85,20 90,25 100,25" stroke="#eef0f4" stroke-width="0.6" opacity="0.5" fill="none" stroke-linecap="round"/>

      <!-- Circuit trace - vertical with jog -->
      <polyline points="50,50 50,60 45,65 45,80 50,85 50,100" stroke="#eef0f4" stroke-width="0.6" opacity="0.5" fill="none" stroke-linecap="round"/>
      <polyline points="25,0 25,10 20,15 20,30 25,35 25,50" stroke="#eef0f4" stroke-width="0.6" opacity="0.5" fill="none" stroke-linecap="round"/>

      <!-- Diagonal accents -->
      <line x1="10" y1="10" x2="15" y2="15" stroke="#eef0f4" stroke-width="0.4" opacity="0.35"/>
      <line x1="85" y1="85" x2="90" y2="90" stroke="#eef0f4" stroke-width="0.4" opacity="0.35"/>
      <line x1="60" y1="10" x2="65" y2="15" stroke="#eef0f4" stroke-width="0.4" opacity="0.35"/>
      <line x1="35" y1="60" x2="40" y2="65" stroke="#eef0f4" stroke-width="0.4" opacity="0.35"/>

      <!-- Small circuit pads / nodes -->
      <rect x="48" y="48" width="4" height="4" rx="0.5" stroke="#eef0f4" stroke-width="0.5" opacity="0.5" fill="none"/>
      <rect x="23" y="48" width="4" height="4" rx="0.5" stroke="#eef0f4" stroke-width="0.4" opacity="0.4" fill="none"/>
      <rect x="48" y="23" width="4" height="4" rx="0.5" stroke="#eef0f4" stroke-width="0.4" opacity="0.4" fill="none"/>
      <rect x="73" y="23" width="4" height="4" rx="0.5" stroke="#eef0f4" stroke-width="0.4" opacity="0.4" fill="none"/>
      <rect x="73" y="73" width="4" height="4" rx="0.5" stroke="#eef0f4" stroke-width="0.4" opacity="0.4" fill="none"/>

      <!-- Center dots in pads -->
      <circle cx="50" cy="50" r="1" fill="#eef0f4" opacity="0.4"/>
      <circle cx="25" cy="50" r="0.8" fill="#eef0f4" opacity="0.3"/>
      <circle cx="50" cy="25" r="0.8" fill="#eef0f4" opacity="0.3"/>
      <circle cx="75" cy="25" r="0.8" fill="#eef0f4" opacity="0.3"/>
      <circle cx="75" cy="75" r="0.8" fill="#eef0f4" opacity="0.3"/>

      <!-- Via holes -->
      <circle cx="0" cy="0" r="1.5" stroke="#eef0f4" stroke-width="0.4" opacity="0.35" fill="none"/>
      <circle cx="0" cy="0" r="0.6" fill="#eef0f4" opacity="0.3"/>

      <!-- Additional trace fragments for density -->
      <line x1="75" y1="50" x2="100" y2="50" stroke="#eef0f4" stroke-width="0.4" opacity="0.35"/>
      <line x1="0" y1="75" x2="25" y2="75" stroke="#eef0f4" stroke-width="0.4" opacity="0.35"/>
      <line x1="75" y1="50" x2="75" y2="75" stroke="#eef0f4" stroke-width="0.4" opacity="0.35"/>

      <!-- Tiny corner markers -->
      <path d="M0,5 L0,0 L5,0" stroke="#eef0f4" stroke-width="0.3" opacity="0.25" fill="none"/>
      <path d="M95,100 L100,100 L100,95" stroke="#eef0f4" stroke-width="0.3" opacity="0.25" fill="none"/>
    </pattern>
  </defs>

  <rect width="100" height="100" fill="url(#innovGrid)"/>
</svg>