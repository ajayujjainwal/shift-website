<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="heroGrad1" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4f5f7"/>
      <stop offset="100%" stop-color="#e8eaf0"/>
    </linearGradient>
    <linearGradient id="heroAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d42e24"/>
      <stop offset="100%" stop-color="#d42e24" stop-opacity="0.4"/>
    </linearGradient>
    <clipPath id="heroClip">
      <rect width="600" height="400" rx="8"/>
    </clipPath>
    <filter id="heroGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a1d26" flood-opacity="0.1"/>
    </filter>
  </defs>

  <g clip-path="url(#heroClip)">
    <!-- Background -->
    <rect width="600" height="400" fill="url(#heroGrad1)"/>

    <!-- Subtle grid pattern -->
    <g stroke="#dde0e8" stroke-width="0.5" opacity="0.5">
      <line x1="0" y1="40" x2="600" y2="40"/>
      <line x1="0" y1="80" x2="600" y2="80"/>
      <line x1="0" y1="120" x2="600" y2="120"/>
      <line x1="0" y1="160" x2="600" y2="160"/>
      <line x1="0" y1="200" x2="600" y2="200"/>
      <line x1="0" y1="240" x2="600" y2="240"/>
      <line x1="0" y1="280" x2="600" y2="280"/>
      <line x1="0" y1="320" x2="600" y2="320"/>
      <line x1="0" y1="360" x2="600" y2="360"/>
      <line x1="40" y1="0" x2="40" y2="400"/>
      <line x1="80" y1="0" x2="80" y2="400"/>
      <line x1="120" y1="0" x2="120" y2="400"/>
      <line x1="160" y1="0" x2="160" y2="400"/>
      <line x1="200" y1="0" x2="200" y2="400"/>
      <line x1="240" y1="0" x2="240" y2="400"/>
      <line x1="280" y1="0" x2="280" y2="400"/>
      <line x1="320" y1="0" x2="320" y2="400"/>
      <line x1="360" y1="0" x2="360" y2="400"/>
      <line x1="400" y1="0" x2="400" y2="400"/>
      <line x1="440" y1="0" x2="440" y2="400"/>
      <line x1="480" y1="0" x2="480" y2="400"/>
      <line x1="520" y1="0" x2="520" y2="400"/>
      <line x1="560" y1="0" x2="560" y2="400"/>
    </g>

    <!-- Circuit board traces - horizontal -->
    <g stroke="#1a1d26" stroke-width="1.5" opacity="0.12" stroke-linecap="round">
      <polyline points="0,120 80,120 100,140 200,140 220,120 320,120"/>
      <polyline points="280,200 360,200 380,180 440,180 460,200 600,200"/>
      <polyline points="0,280 120,280 140,260 240,260 260,280 400,280"/>
      <polyline points="400,320 480,320 500,300 560,300 580,320 600,320"/>
      <polyline points="0,60 60,60 80,80 160,80"/>
      <polyline points="440,80 500,80 520,60 600,60"/>
      <polyline points="0,340 100,340 120,360 200,360"/>
    </g>

    <!-- Circuit board traces - vertical -->
    <g stroke="#1a1d26" stroke-width="1.5" opacity="0.12" stroke-linecap="round">
      <polyline points="120,0 120,60 140,80 140,120"/>
      <polyline points="480,0 480,80 460,100 460,160"/>
      <polyline points="200,240 200,300 220,320 220,400"/>
      <polyline points="520,200 520,280 540,300 540,400"/>
      <polyline points="80,280 80,340 60,360 60,400"/>
    </g>

    <!-- Circuit nodes on grid intersections -->
    <g fill="#dde0e8" stroke="#1a1d26" stroke-width="1" opacity="0.2">
      <circle cx="80" cy="120" r="3"/>
      <circle cx="320" cy="120" r="3"/>
      <circle cx="160" cy="80" r="3"/>
      <circle cx="280" cy="200" r="3"/>
      <circle cx="440" cy="180" r="3"/>
      <circle cx="120" cy="280" r="3"/>
      <circle cx="400" cy="280" r="3"/>
      <circle cx="480" cy="80" r="3"/>
      <circle cx="200" cy="360" r="3"/>
      <circle cx="520" cy="60" r="3"/>
    </g>

    <!-- Active red accent nodes -->
    <g filter="url(#heroGlow)">
      <circle cx="220" cy="120" r="4" fill="#d42e24" opacity="0.8"/>
      <circle cx="460" cy="200" r="4" fill="#d42e24" opacity="0.8"/>
      <circle cx="260" cy="280" r="4" fill="#d42e24" opacity="0.6"/>
      <circle cx="140" cy="120" r="3.5" fill="#d42e24" opacity="0.7"/>
      <circle cx="540" cy="300" r="3.5" fill="#d42e24" opacity="0.5"/>
    </g>

    <!-- Car silhouette - geometric/abstract -->
    <g filter="url(#softShadow)">
      <!-- Car body - main shape -->
      <path d="M140,255 L170,225 C175,220 185,215 195,215 L310,215 C320,215 330,218 335,222 L380,250 L420,250 C428,250 435,257 435,265 L435,275 C435,280 430,285 425,285 L155,285 C150,285 145,280 145,275 L140,255 Z"
            fill="#f4f5f7" stroke="#1a1d26" stroke-width="2.5"/>

      <!-- Windshield -->
      <path d="M175,225 L200,215 L305,215 L330,225 L310,225 C300,225 205,225 175,225 Z"
            fill="#e8eaf0" stroke="#1a1d26" stroke-width="1.5"/>

      <!-- Roof line -->
      <path d="M195,215 L205,195 C210,188 220,184 230,184 L290,184 C300,184 308,188 312,195 L320,215"
            fill="#e8eaf0" stroke="#1a1d26" stroke-width="2.5"/>

      <!-- Windows -->
      <path d="M210,198 L218,188 C222,184 228,182 235,182 L258,182 L250,198 Z"
            fill="#dde0e8" stroke="#1a1d26" stroke-width="1"/>
      <path d="M255,198 L263,182 L285,182 C292,182 298,184 302,188 L308,198 Z"
            fill="#dde0e8" stroke="#1a1d26" stroke-width="1"/>

      <!-- Pillar between windows -->
      <line x1="252" y1="182" x2="252" y2="198" stroke="#1a1d26" stroke-width="2"/>

      <!-- Headlight front -->
      <rect x="420" y="252" width="18" height="10" rx="3" fill="#f4f5f7" stroke="#1a1d26" stroke-width="1.5"/>
      <rect x="422" y="254" width="8" height="6" rx="2" fill="#d42e24" opacity="0.8"/>

      <!-- Tail light -->
      <rect x="142" y="258" width="14" height="8" rx="2" fill="#d42e24" opacity="0.7"/>

      <!-- Wheels -->
      <circle cx="195" cy="285" r="22" fill="#f4f5f7" stroke="#1a1d26" stroke-width="2.5"/>
      <circle cx="195" cy="285" r="14" fill="#e8eaf0" stroke="#1a1d26" stroke-width="1.5"/>
      <circle cx="195" cy="285" r="5" fill="#1a1d26" opacity="0.3"/>
      <!-- Wheel spokes -->
      <g stroke="#1a1d26" stroke-width="1" opacity="0.3">
        <line x1="195" y1="271" x2="195" y2="279"/>
        <line x1="195" y1="291" x2="195" y2="299"/>
        <line x1="181" y1="285" x2="189" y2="285"/>
        <line x1="201" y1="285" x2="209" y2="285"/>
        <line x1="185" y1="275" x2="191" y2="281"/>
        <line x1="199" y1="289" x2="205" y2="295"/>
      </g>

      <circle cx="385" cy="285" r="22" fill="#f4f5f7" stroke="#1a1d26" stroke-width="2.5"/>
      <circle cx="385" cy="285" r="14" fill="#e8eaf0" stroke="#1a1d26" stroke-width="1.5"/>
      <circle cx="385" cy="285" r="5" fill="#1a1d26" opacity="0.3"/>
      <!-- Wheel spokes -->
      <g stroke="#1a1d26" stroke-width="1" opacity="0.3">
        <line x1="385" y1="271" x2="385" y2="279"/>
        <line x1="385" y1="291" x2="385" y2="299"/>
        <line x1="371" y1="285" x2="379" y2="285"/>
        <line x1="391" y1="285" x2="399" y2="285"/>
        <line x1="375" y1="275" x2="381" y2="281"/>
        <line x1="389" y1="289" x2="395" y2="295"/>
      </g>

      <!-- Body accent line -->
      <line x1="155" y1="248" x2="425" y2="248" stroke="#1a1d26" stroke-width="0.8" opacity="0.3"/>
      <line x1="160" y1="265" x2="170" y2="265" stroke="#1a1d26" stroke-width="0.8" opacity="0.3"/>
      <line x1="410" y1="265" x2="420" y2="265" stroke="#1a1d26" stroke-width="0.8" opacity="0.3"/>

      <!-- Door handle -->
      <rect x="270" y="235" width="16" height="3" rx="1.5" fill="none" stroke="#1a1d26" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Sensor waves emanating from car -->
    <g stroke="#d42e24" fill="none" stroke-width="1.2" opacity="0.3">
      <!-- Front sensors -->
      <path d="M445,258 C465,248 475,238 480,220" stroke-dasharray="3,3"/>
      <path d="M450,258 C475,248 490,235 498,212" stroke-dasharray="3,3"/>
      <path d="M455,262 C485,255 505,242 515,218" stroke-dasharray="3,3"/>

      <!-- Roof sensor waves (lidar) -->
      <path d="M260,180 C260,160 270,140 290,125"/>
      <path d="M260,180 C255,158 250,140 240,125"/>
      <path d="M260,180 C265,155 280,130 310,115"/>
      <path d="M260,180 C250,155 235,130 210,115"/>
    </g>

    <!-- Signal arcs from roof -->
    <g stroke="#d42e24" fill="none" stroke-width="1" opacity="0.2">
      <path d="M235,118 C250,108 275,105 295,112"/>
      <path d="M220,105 C248,90 280,88 310,100"/>
      <path d="M205,92 C245,72 285,70 325,88"/>
    </g>

    <!-- Data flow particles -->
    <g fill="#d42e24" opacity="0.5">
      <circle cx="470" cy="235" r="2">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="490" cy="222" r="1.5">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="505" cy="228" r="1.5">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="275" cy="135" r="2">
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="245" cy="128" r="1.5">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Connectivity lines from car to abstract cloud/network -->
    <g stroke="#1a1d26" stroke-width="0.8" opacity="0.1" stroke-dasharray="4,4">
      <line x1="290" y1="184" x2="450" y2="80"/>
      <line x1="290" y1="184" x2="500" y2="120"/>
      <line x1="290" y1="184" x2="520" y2="60"/>
    </g>

    <!-- Network nodes top-right cluster -->
    <g filter="url(#heroGlow)">
      <circle cx="450" cy="80" r="6" fill="#f4f5f7" stroke="#1a1d26" stroke-width="1.5"/>
      <circle cx="450" cy="80" r="2.5" fill="#d42e24" opacity="0.7"/>

      <circle cx="500" cy="120" r="5" fill="#f4f5f7" stroke="#1a1d26" stroke-width="1.5"/>
      <circle cx="500" cy="120" r="2" fill="#d42e24" opacity="0.6"/>

      <circle cx="520" cy="60" r="7" fill="#f4f5f7" stroke="#1a1d26" stroke-width="1.5"/>
      <circle cx="520" cy="60" r="3" fill="#d42e24" opacity="0.8"/>

      <circle cx="560" cy="90" r="4" fill="#f4f5f7" stroke="#1a1d26" stroke-width="1"/>
      <circle cx="560" cy="90" r="1.5" fill="#d42e24" opacity="0.5"/>

      <circle cx="480" cy="50" r="4" fill="#f4f5f7" stroke="#1a1d26" stroke-width="1"/>
      <circle cx="480" cy="50" r="1.5" fill="#d42e24" opacity="0.5"/>
    </g>

    <!-- Network connections between nodes -->
    <g stroke="#dde0e8" stroke-width="1.2" opacity="0.6">
      <line x1="450" y1="80" x2="500" y2="120"/>
      <line x1="450" y1="80" x2="520" y2="60"/>
      <line x1="500" y1="120" x2="560" y2="90"/>
      <line x1="520" y1="60" x2="560" y2="90"/>
      <line x1="480" y1="50" x2="520" y2="60"/>
      <line x1="450" y1="80" x2="480" y2="50"/>
    </g>

    <!-- Abstract data stream left side -->
    <g opacity="0.15">
      <rect x="20" y="150" width="50" height="2" rx="1" fill="#1a1d26"/>
      <rect x="30" y="158" width="35" height="2" rx="1" fill="#1a1d26"/>
      <rect x="15" y="166" width="55" height="2" rx="1" fill="#1a1d26"/>
      <rect x="25" y="174" width="40" height="2" rx="1" fill="#d42e24"/>
      <rect x="20" y="182" width="48" height="2" rx="1" fill="#1a1d26"/>
      <rect x="35" y="190" width="30" height="2" rx="1" fill="#1a1d26"/>
    </g>

    <!-- Road/ground line -->
    <line x1="100" y1="307" x2="500" y2="307" stroke="#dde0e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="80" y1="307" x2="95" y2="307" stroke="#dde0e8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="505" y1="307" x2="520" y2="307" stroke="#dde0e8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- Road dashes -->
    <g stroke="#dde0e8" stroke-width="1.5" stroke-dasharray="12,8" opacity="0.4">
      <line x1="120" y1="315" x2="480" y2="315"/>
    </g>

    <!-- Decorative corner elements -->
    <g stroke="#dde0e8" stroke-width="1" opacity="0.4">
      <polyline points="20,20 20,50" fill="none"/>
      <polyline points="20,20 50,20" fill="none"/>
      <polyline points="580,20 580,50" fill="none"/>
      <polyline points="580,20 550,20" fill="none"/>
      <polyline points="20,380 20,350" fill="none"/>
      <polyline points="20,380 50,380" fill="none"/>
      <polyline points="580,380 580,350" fill="none"/>
      <polyline points="580,380 550,380" fill="none"/>
    </g>

    <!-- Small accent dots in corners -->
    <circle cx="20" cy="20" r="2" fill="#d42e24" opacity="0.4"/>
    <circle cx="580" cy="20" r="2" fill="#d42e24" opacity="0.4"/>
    <circle cx="20" cy="380" r="2" fill="#d42e24" opacity="0.4"/>
    <circle cx="580" cy="380" r="2" fill="#d42e24" opacity="0.4"/>
  </g>
</svg>